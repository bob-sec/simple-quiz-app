# ─────────────────────────────────────────────────────────────
#  Quiz App – Nginx Configuration
# ─────────────────────────────────────────────────────────────
#
#  TLS (HTTPS) Setup:
#  1. Place your certificate files in ./nginx/certs/:
#       fullchain.pem  – certificate + chain
#       privkey.pem    – private key
#  2. Uncomment the HTTPS server block below and the
#     HTTP → HTTPS redirect block.
#  3. Comment out (or remove) the plain HTTP server block.
# ─────────────────────────────────────────────────────────────

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# ── HTTP → HTTPS redirect (enable when using TLS) ────────────
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# ── HTTP (plain) ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── TLS (uncomment to enable) ────────────────────────────
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;
    # add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 20M;

    # ── Quiz images (served directly from volume) ────────────
    location /images/ {
        alias /usr/share/nginx/quiz-images/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket ────────────────────────────────────────────
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend (SPA) ───────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

